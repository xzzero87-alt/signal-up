<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}업비트 시그널{% endblock %} — 업비트 시그널 프로그램</title>
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
<nav class="nav">
  <span class="nav-brand">&#128202; 업비트 시그널</span>
  <ul class="nav-links">
    <li><a href="/" {% if active == 'dashboard' %}class="active"{% endif %}>대시보드</a></li>
    <li><a href="/settings" {% if active == 'settings' %}class="active"{% endif %}>설정</a></li>
    <li><a href="/backtest" {% if active == 'backtest' %}class="active"{% endif %}>백테스트</a></li>
  </ul>
  <div class="nav-daemon" id="nav-daemon">
    <span id="nav-daemon-status" class="daemon-indicator">데몬: <strong>확인 중</strong></span>
    <button id="nav-daemon-btn" class="btn-daemon" onclick="toggleDaemon()">—</button>
    <button class="btn-theme" onclick="toggleTheme()" id="btn-theme" title="다크/라이트 모드 전환" aria-label="다크/라이트 모드 전환">
      <span id="themeIcon" aria-hidden="true">🌙</span>
    </button>
  </div>
</nav>
<script>
/* ── 다크 모드 초기화 (R_P1_8) ─────────────────────────────────────────────
   FOUC 방지: DOMContentLoaded 이전에 data-theme 속성을 설정한다.
   저장값 없으면 data-theme 미설정 → CSS @media가 OS 설정을 자동 follow. */
(function(){
  var saved = localStorage.getItem('signal-theme');
  if (saved === 'dark' || saved === 'light') {
    document.documentElement.setAttribute('data-theme', saved);
  }
  document.addEventListener('DOMContentLoaded', function(){
    var icon = document.getElementById('themeIcon');
    if (!icon) return;
    var isDark = saved === 'dark' ||
      (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches);
    icon.textContent = isDark ? '☀️' : '🌙';
  });
})();
function toggleTheme(){
  var html = document.documentElement;
  var cur = html.getAttribute('data-theme');
  var isDark = cur === 'dark' ||
    (cur !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
  var next = isDark ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('signal-theme', next);
  var icon = document.getElementById('themeIcon');
  if (icon) icon.textContent = next === 'dark' ? '☀️' : '🌙';
}
</script>
<main class="main">
  {% block content %}{% endblock %}
</main>
<footer class="footer">
  <small>업비트 시그널 프로그램 v2.0 — 참고용 시그널. 자동매매 아님.</small>
</footer>
{% block scripts %}{% endblock %}
</body>
</html>
